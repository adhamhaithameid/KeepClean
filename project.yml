name: KeepClean

options:
  createIntermediateGroups: true
  defaultConfig: Debug
  deploymentTarget:
    macOS: "15.0"

configs:
  Debug: debug
  Release: release

settings:
  base:
    SWIFT_VERSION: 6.0
    MARKETING_VERSION: 1.0.0
    CURRENT_PROJECT_VERSION: 1
    GENERATE_INFOPLIST_FILE: NO
    MACOSX_DEPLOYMENT_TARGET: "15.0"

targets:
  KeepClean:
    type: application
    platform: macOS
    deploymentTarget: "15.0"
    sources:
      - path: KeepClean/App
      - path: KeepClean/Models
      - path: KeepClean/Services
      - path: KeepClean/Views
      - path: KeepClean/Support
    resources:
      - path: KeepClean/Resources
    info:
      path: KeepClean/Info.plist
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.adhamhaithameid.keepclean
        PRODUCT_NAME: KeepClean
    dependencies:
      - target: KeepCleanHelper
    postBuildScripts:
      - name: Embed Helper
        script: |
          set -euo pipefail
          DEST="$TARGET_BUILD_DIR/$CONTENTS_FOLDER_PATH/Helpers"
          mkdir -p "$DEST"
          cp "$BUILT_PRODUCTS_DIR/KeepCleanHelper" "$DEST/KeepCleanHelper"
          chmod +x "$DEST/KeepCleanHelper"

  KeepCleanHelper:
    type: tool
    platform: macOS
    deploymentTarget: "15.0"
    sources:
      - path: KeepCleanHelper
      - path: KeepClean/Models
      - path: KeepClean/Support/AppError.swift
      - path: KeepClean/Services/BuiltInInputControlling.swift
      - path: KeepClean/Services/LiveBuiltInInputController.swift
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.adhamhaithameid.keepclean.helper
        PRODUCT_NAME: KeepCleanHelper

  KeepCleanTests:
    type: bundle.unit-test
    platform: macOS
    deploymentTarget: "15.0"
    sources:
      - path: KeepCleanTests
    dependencies:
      - target: KeepClean
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.adhamhaithameid.keepclean.tests
        TEST_HOST: "$(BUILT_PRODUCTS_DIR)/KeepClean.app/Contents/MacOS/KeepClean"
        BUNDLE_LOADER: "$(TEST_HOST)"

  KeepCleanUITests:
    type: bundle.ui-testing
    platform: macOS
    deploymentTarget: "15.0"
    sources:
      - path: KeepCleanUITests
    dependencies:
      - target: KeepClean
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.adhamhaithameid.keepclean.uitests

schemes:
  KeepClean:
    build:
      targets:
        KeepClean: all
        KeepCleanHelper: [run, test]
        KeepCleanTests: test
        KeepCleanUITests: test
    test:
      gatherCoverageData: true
      targets:
        - name: KeepCleanTests
        - name: KeepCleanUITests
