name: KeepClean

options:
  createIntermediateGroups: true
  defaultConfig: Debug
  deploymentTarget:
    macOS: "13.0"

configs:
  Debug: debug
  Release: release

settings:
  base:
    SWIFT_VERSION: 6.0
    MARKETING_VERSION: 1.0.0
    CURRENT_PROJECT_VERSION: 1
    GENERATE_INFOPLIST_FILE: NO
    MACOSX_DEPLOYMENT_TARGET: "13.0"

packages:
  FitWindow:
    path: ../FitWindow

targets:
  KeepClean:
    type: application
    platform: macOS
    deploymentTarget: "13.0"
    sources:
      - path: KeepClean/App
      - path: KeepClean/Models
      - path: KeepClean/Services
      - path: KeepClean/Views
      - path: KeepClean/Support
    resources:
      - path: KeepClean/Resources/profile.png
      - path: KeepClean/Resources/KeepClean.icns
      - path: KeepClean/Resources/brand-mark.png
      - path: KeepClean/Resources/Assets.xcassets
    info:
      path: KeepClean/Info.plist
    settings:
      base:
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        INFOPLIST_KEY_CFBundleIconFile: KeepClean.icns
        PRODUCT_BUNDLE_IDENTIFIER: com.adhamhaithameid.keepclean
        PRODUCT_NAME: KeepClean
        ENABLE_HARDENED_RUNTIME: YES
        CODE_SIGN_ENTITLEMENTS: KeepClean/KeepClean.entitlements
        CODE_SIGN_STYLE: Automatic
    dependencies:
      - target: KeepCleanHelper
      - sdk: UserNotifications.framework
      - package: FitWindow
    postBuildScripts:
      - name: Copy App Resources & Fix Icon
        script: |
          set -euo pipefail
          DEST="$TARGET_BUILD_DIR/$CONTENTS_FOLDER_PATH/Resources"
          PLIST="$TARGET_BUILD_DIR/$INFOPLIST_PATH"
          mkdir -p "$DEST"
          cp -f "$SRCROOT/KeepClean/Resources/profile.png"    "$DEST/profile.png"
          cp -f "$SRCROOT/KeepClean/Resources/KeepClean.icns" "$DEST/KeepClean.icns"
          cp -f "$SRCROOT/KeepClean/Resources/brand-mark.png" "$DEST/brand-mark.png"
          # Inject CFBundleIconFile — value must NOT have .icns extension
          if /usr/libexec/PlistBuddy -c "Print :CFBundleIconFile" "$PLIST" >/dev/null 2>&1; then
            /usr/libexec/PlistBuddy -c "Set :CFBundleIconFile KeepClean" "$PLIST"
          else
            /usr/libexec/PlistBuddy -c "Add :CFBundleIconFile string KeepClean" "$PLIST"
          fi
          # Also set CFBundleIconName (used by modern macOS)
          if /usr/libexec/PlistBuddy -c "Print :CFBundleIconName" "$PLIST" >/dev/null 2>&1; then
            /usr/libexec/PlistBuddy -c "Set :CFBundleIconName KeepClean" "$PLIST"
          else
            /usr/libexec/PlistBuddy -c "Add :CFBundleIconName string KeepClean" "$PLIST"
          fi
          echo "[KeepClean] Icon keys injected into $PLIST"
        # No outputFiles → script always runs, never skipped
      - name: Embed Helper
        script: |
          set -euo pipefail
          DEST="$TARGET_BUILD_DIR/$CONTENTS_FOLDER_PATH/Helpers"
          mkdir -p "$DEST"
          cp "$BUILT_PRODUCTS_DIR/KeepCleanHelper" "$DEST/KeepCleanHelper"
          chmod +x "$DEST/KeepCleanHelper"
        outputFiles:
          - $(TARGET_BUILD_DIR)/$(CONTENTS_FOLDER_PATH)/Helpers/KeepCleanHelper

  KeepCleanHelper:
    type: tool
    platform: macOS
    deploymentTarget: "13.0"
    sources:
      - path: KeepCleanHelper
      - path: KeepClean/Models
      - path: KeepClean/Support/AppError.swift
      - path: KeepClean/Services/BuiltInInputControlling.swift
      - path: KeepClean/Services/LiveBuiltInInputController.swift
      - path: KeepClean/Services/EmergencyStopShortcut.swift
    settings:
      base:
        OTHER_SWIFT_FLAGS: -parse-as-library
        PRODUCT_BUNDLE_IDENTIFIER: com.adhamhaithameid.keepclean.helper
        PRODUCT_NAME: KeepCleanHelper
        ENABLE_HARDENED_RUNTIME: YES
        CODE_SIGN_ENTITLEMENTS: KeepCleanHelper/KeepCleanHelper.entitlements
        CODE_SIGN_STYLE: Automatic

  KeepCleanTests:
    type: bundle.unit-test
    platform: macOS
    deploymentTarget: "13.0"
    sources:
      - path: KeepCleanTests
    dependencies:
      - target: KeepClean
    settings:
      base:
        GENERATE_INFOPLIST_FILE: YES
        PRODUCT_BUNDLE_IDENTIFIER: com.adhamhaithameid.keepclean.tests
        TEST_HOST: "$(BUILT_PRODUCTS_DIR)/KeepClean.app/Contents/MacOS/KeepClean"
        BUNDLE_LOADER: "$(TEST_HOST)"

  KeepCleanUITests:
    type: bundle.ui-testing
    platform: macOS
    deploymentTarget: "13.0"
    sources:
      - path: KeepCleanUITests
    dependencies:
      - target: KeepClean
    settings:
      base:
        GENERATE_INFOPLIST_FILE: YES
        PRODUCT_BUNDLE_IDENTIFIER: com.adhamhaithameid.keepclean.uitests

schemes:
  KeepClean:
    build:
      targets:
        KeepClean: all
        KeepCleanHelper: run
    test:
      gatherCoverageData: true
      targets:
        - name: KeepCleanTests
        - name: KeepCleanUITests
