name: KeepClean

options:
  createIntermediateGroups: true
  defaultConfig: Debug
  deploymentTarget:
    macOS: "15.0"

configs:
  Debug: debug
  Release: release

settings:
  base:
    SWIFT_VERSION: 6.0
    MARKETING_VERSION: 1.0.0
    CURRENT_PROJECT_VERSION: 1
    GENERATE_INFOPLIST_FILE: NO
    MACOSX_DEPLOYMENT_TARGET: "15.0"

targets:
  KeepClean:
    type: application
    platform: macOS
    deploymentTarget: "15.0"
    sources:
      - path: KeepClean/App
      - path: KeepClean/Models
      - path: KeepClean/Services
      - path: KeepClean/Views
      - path: KeepClean/Support
    resources:
      - path: KeepClean/Resources/profile.png
      - path: KeepClean/Resources/KeepClean.icns
      - path: KeepClean/Resources/Assets.xcassets
    info:
      path: KeepClean/Info.plist
    settings:
      base:
        INFOPLIST_KEY_CFBundleIconFile: KeepClean.icns
        PRODUCT_BUNDLE_IDENTIFIER: com.adhamhaithameid.keepclean
        PRODUCT_NAME: KeepClean
    dependencies:
      - target: KeepCleanHelper
    postBuildScripts:
      - name: Copy App Resources
        script: |
          set -euo pipefail
          DEST="$TARGET_BUILD_DIR/$CONTENTS_FOLDER_PATH/Resources"
          PLIST="$TARGET_BUILD_DIR/$INFOPLIST_PATH"
          mkdir -p "$DEST"
          rm -f "$DEST/brand-mark.png"
          cp "$SRCROOT/KeepClean/Resources/profile.png" "$DEST/profile.png"
          cp "$SRCROOT/KeepClean/Resources/KeepClean.icns" "$DEST/KeepClean.icns"
          if /usr/libexec/PlistBuddy -c "Print :CFBundleIconFile" "$PLIST" >/dev/null 2>&1; then
            /usr/libexec/PlistBuddy -c "Set :CFBundleIconFile KeepClean.icns" "$PLIST"
          else
            /usr/libexec/PlistBuddy -c "Add :CFBundleIconFile string KeepClean.icns" "$PLIST"
          fi
        outputFiles:
          - $(TARGET_BUILD_DIR)/$(CONTENTS_FOLDER_PATH)/Resources/profile.png
          - $(TARGET_BUILD_DIR)/$(CONTENTS_FOLDER_PATH)/Resources/KeepClean.icns
      - name: Embed Helper
        script: |
          set -euo pipefail
          DEST="$TARGET_BUILD_DIR/$CONTENTS_FOLDER_PATH/Helpers"
          mkdir -p "$DEST"
          cp "$BUILT_PRODUCTS_DIR/KeepCleanHelper" "$DEST/KeepCleanHelper"
          chmod +x "$DEST/KeepCleanHelper"
        outputFiles:
          - $(TARGET_BUILD_DIR)/$(CONTENTS_FOLDER_PATH)/Helpers/KeepCleanHelper

  KeepCleanHelper:
    type: tool
    platform: macOS
    deploymentTarget: "15.0"
    sources:
      - path: KeepCleanHelper
      - path: KeepClean/Models
      - path: KeepClean/Support/AppError.swift
      - path: KeepClean/Services/BuiltInInputControlling.swift
      - path: KeepClean/Services/LiveBuiltInInputController.swift
    settings:
      base:
        OTHER_SWIFT_FLAGS: -parse-as-library
        PRODUCT_BUNDLE_IDENTIFIER: com.adhamhaithameid.keepclean.helper
        PRODUCT_NAME: KeepCleanHelper

  KeepCleanTests:
    type: bundle.unit-test
    platform: macOS
    deploymentTarget: "15.0"
    sources:
      - path: KeepCleanTests
    dependencies:
      - target: KeepClean
    settings:
      base:
        GENERATE_INFOPLIST_FILE: YES
        PRODUCT_BUNDLE_IDENTIFIER: com.adhamhaithameid.keepclean.tests
        TEST_HOST: "$(BUILT_PRODUCTS_DIR)/KeepClean.app/Contents/MacOS/KeepClean"
        BUNDLE_LOADER: "$(TEST_HOST)"

  KeepCleanUITests:
    type: bundle.ui-testing
    platform: macOS
    deploymentTarget: "15.0"
    sources:
      - path: KeepCleanUITests
    dependencies:
      - target: KeepClean
    settings:
      base:
        GENERATE_INFOPLIST_FILE: YES
        PRODUCT_BUNDLE_IDENTIFIER: com.adhamhaithameid.keepclean.uitests

schemes:
  KeepClean:
    build:
      targets:
        KeepClean: all
        KeepCleanHelper: run
    test:
      gatherCoverageData: true
      targets:
        - name: KeepCleanTests
        - name: KeepCleanUITests
